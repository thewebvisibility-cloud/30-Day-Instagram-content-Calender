<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30-Day Instagram Content Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FDF6ED;
  --warm-white: #FEFCF8;
  --ink: #1A1208;
  --gold: #C9973A;
  --gold-light: #F0D4A0;
  --blush: #E8C4B0;
  --sage: #8FA68E;
  --dusty-rose: #C4847A;
  --charcoal: #3D3530;
  --muted: #8A7E75;
  --border: #E8DDD0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  min-height: 100vh;
}

/* ── HEADER ── */
.masthead {
  background: var(--ink);
  color: var(--cream);
  padding: 60px 40px 50px;
  position: relative;
  overflow: hidden;
}
.masthead::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 320px; height: 320px;
  border: 2px solid rgba(201,151,58,0.3);
  border-radius: 50%;
  pointer-events: none;
}
.masthead::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 10%;
  width: 180px; height: 180px;
  border: 1px solid rgba(201,151,58,0.15);
  border-radius: 50%;
  pointer-events: none;
}
.masthead-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 40px;
  flex-wrap: wrap;
}
.masthead-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
}
.masthead h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  font-weight: 900;
  line-height: 1.05;
  max-width: 560px;
}
.masthead h1 em {
  font-style: italic;
  color: var(--gold);
}
.masthead-meta {
  text-align: right;
  flex-shrink: 0;
}
.masthead-meta .big-num {
  font-family: 'Playfair Display', serif;
  font-size: 5rem;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
}
.masthead-meta p {
  font-size: 13px;
  color: rgba(253,246,237,0.6);
  margin-top: 4px;
}

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--warm-white);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  gap: 0;
  overflow-x: auto;
}
.filter-bar::-webkit-scrollbar { height: 0; }
.filter-btn {
  padding: 16px 22px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  white-space: nowrap;
  transition: all 0.2s;
}
.filter-btn:hover { color: var(--ink); }
.filter-btn.active {
  color: var(--ink);
  border-bottom-color: var(--gold);
  font-weight: 600;
}

/* ── MAIN GRID ── */
.calendar-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 48px 24px;
}

/* ── WEEK LABELS ── */
.week-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 48px 0 24px;
}
.week-header:first-child { margin-top: 0; }
.week-label {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-style: italic;
  color: var(--muted);
  white-space: nowrap;
}
.week-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── DAY CARDS ── */
.days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 12px;
}

@media (max-width: 900px) {
  .days-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 560px) {
  .days-grid { grid-template-columns: repeat(2, 1fr); }
  .filter-bar { padding: 0 16px; }
  .calendar-wrap { padding: 32px 16px; }
  .masthead { padding: 40px 20px; }
}

.day-card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}
.day-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--border);
  transition: background 0.2s;
}
.day-card:hover {
  border-color: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(26,18,8,0.08);
}
.day-card:hover::before { background: var(--gold); }
.day-card.active {
  border-color: var(--gold);
  box-shadow: 0 8px 24px rgba(201,151,58,0.18);
}
.day-card.active::before { background: var(--gold); }

.day-num {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}
.day-name {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 3px 0 8px;
}
.day-theme {
  font-size: 12px;
  font-weight: 500;
  color: var(--charcoal);
  line-height: 1.3;
}
.day-type-pill {
  display: inline-block;
  margin-top: 8px;
  padding: 3px 8px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* Pill colors by category */
.pill-motivational  { background: #FFF0D9; color: #B5740A; }
.pill-educational   { background: #E8F4EC; color: #3A7A4A; }
.pill-personal      { background: #F4E8EC; color: #8A3A4A; }
.pill-entertaining  { background: #E8ECF4; color: #3A4A8A; }
.pill-promotional   { background: #F0E8F4; color: #6A3A8A; }
.pill-community     { background: #F4F0E8; color: #7A6030; }

/* ── MODAL OVERLAY ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,18,8,0.6);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  backdrop-filter: blur(4px);
}
.overlay.open {
  opacity: 1;
  pointer-events: all;
}

/* ── MODAL CARD ── */
.modal {
  background: var(--warm-white);
  border-radius: 20px;
  width: 100%;
  max-width: 660px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.25s ease;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.overlay.open .modal {
  transform: translateY(0) scale(1);
}
.modal::-webkit-scrollbar { width: 6px; }
.modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.modal-header {
  background: var(--ink);
  color: var(--cream);
  padding: 28px 32px;
  border-radius: 20px 20px 0 0;
  position: relative;
}
.modal-header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}
.modal-day-badge {
  font-family: 'Playfair Display', serif;
  font-size: 0.85rem;
  font-style: italic;
  color: var(--gold);
  margin-bottom: 8px;
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 700;
  line-height: 1.2;
}
.modal-close {
  background: rgba(255,255,255,0.1);
  border: none;
  color: var(--cream);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}
.modal-close:hover { background: rgba(255,255,255,0.2); }

.modal-meta {
  display: flex;
  gap: 16px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.modal-meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: rgba(253,246,237,0.7);
}
.modal-meta-item span:first-child { font-size: 14px; }

/* ── MODAL BODY ── */
.modal-body {
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
}

/* SLIDES PREVIEW */
.slides-strip {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.slides-strip::-webkit-scrollbar { height: 0; }
.slide-chip {
  flex-shrink: 0;
  width: 90px;
  height: 90px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 8px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  line-height: 1.3;
  position: relative;
}
.slide-chip .chip-num {
  position: absolute;
  top: 5px; left: 7px;
  font-size: 9px;
  opacity: 0.7;
}

/* CAPTION BOX */
.caption-box {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  font-size: 14px;
  line-height: 1.75;
  color: var(--charcoal);
  white-space: pre-wrap;
  word-break: break-word;
}

/* HASHTAG BOX */
.hashtag-box {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 13px;
  line-height: 1.9;
  color: var(--gold);
  font-weight: 500;
  word-break: break-word;
}

/* COPY BUTTONS */
.copy-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 11px 20px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
}
.copy-btn-primary {
  background: var(--ink);
  color: var(--cream);
}
.copy-btn-primary:hover {
  background: var(--charcoal);
  transform: translateY(-1px);
}
.copy-btn-outline {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--charcoal);
}
.copy-btn-outline:hover {
  border-color: var(--gold);
  color: var(--ink);
}
.copy-btn.copied {
  background: var(--sage) !important;
  color: #fff !important;
  border-color: var(--sage) !important;
}

/* NAV ARROWS */
.modal-nav {
  display: flex;
  justify-content: space-between;
  padding: 0 32px 28px;
}
.nav-arrow {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: 1.5px solid var(--border);
  padding: 10px 18px;
  border-radius: 100px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--charcoal);
  transition: all 0.2s;
}
.nav-arrow:hover:not(:disabled) {
  border-color: var(--gold);
  color: var(--ink);
}
.nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

/* PROGRESS BAR */
.progress-bar-wrap {
  background: var(--ink);
  padding: 16px 40px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.progress-track {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 10px;
  transition: width 0.5s ease;
}
.progress-label {
  font-size: 12px;
  color: rgba(253,246,237,0.5);
  white-space: nowrap;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: var(--cream);
  padding: 12px 24px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 500;
  z-index: 999;
  transition: transform 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── WATERMARK ── */
.watermark-overlay {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.watermark-text {
  position: absolute;
  inset: -50%;
  width: 200%;
  height: 200%;
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  transform: rotate(-35deg);
  transform-origin: center center;
}
.watermark-item {
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: rgba(120, 120, 120, 0.18);
  white-space: nowrap;
  padding: 120px 80px;
  letter-spacing: 0.1em;
  user-select: none;
  text-transform: uppercase;
}

/* ── INSTAGRAM LINK ── */
.ig-link {
  position: absolute;
  top: 20px;
  right: 24px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 100px;
  letter-spacing: 0.04em;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 10;
}
.ig-link:hover { opacity: 0.9; transform: translateY(-1px); }
.ig-link svg { width: 14px; height: 14px; fill: #fff; flex-shrink: 0; }
</style>
</head>

</div>

<!-- TOAST -->

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentDay = null;
let copiedDays = new Set();
let activeFilter = 'all';

// ─── BUILD CALENDAR ───────────────────────────────────────────────────────────
function buildCalendar(filter = 'all') {
  const wrap = document.getElementById('calendarWrap');
  wrap.innerHTML = '';

  const filtered = filter === 'all' ? days : days.filter(d => d.category === filter);

  if (filter !== 'all') {
    const section = document.createElement('div');
    section.innerHTML = `
      <div class="week-header">
        <span class="week-label">Filtered: ${filter}</span>
        <div class="week-line"></div>
      </div>
      <div class="days-grid">${filtered.map(d => dayCardHTML(d)).join('')}</div>
    `;
    wrap.appendChild(section);
    return;
  }

  // Group into weeks of 7
  const weeks = [
    { label: 'Week One — Build Momentum', days: days.slice(0, 7) },
    { label: 'Week Two — Deepen the Story', days: days.slice(7, 14) },
    { label: 'Week Three — Level Up', days: days.slice(14, 21) },
    { label: 'Week Four — Finish Strong', days: days.slice(21, 30) }
  ];

  weeks.forEach(week => {
    const section = document.createElement('div');
    section.innerHTML = `
      <div class="week-header">
        <span class="week-label">${week.label}</span>
        <div class="week-line"></div>
      </div>
      <div class="days-grid">${week.days.map(d => dayCardHTML(d)).join('')}</div>
    `;
    wrap.appendChild(section);
  });
}

function dayCardHTML(d) {
  const done = copiedDays.has(d.day) ? '✓ ' : '';
  const pillClass = `pill-${d.category}`;
  return `
    <div class="day-card ${copiedDays.has(d.day) ? 'active' : ''}" onclick="openDay(${d.day})" id="card-${d.day}">
      <div class="day-num">${done}${d.day}</div>
      <div class="day-name">${d.dayName}</div>
      <div class="day-theme">${d.theme}</div>
      <span class="day-type-pill ${pillClass}">${d.category}</span>
    </div>`;
}

// ─── MODAL OPEN / CLOSE ───────────────────────────────────────────────────────
function openDay(dayNum) {
  const d = days.find(x => x.day === dayNum);
  if (!d) return;
  currentDay = d;

  document.getElementById('mDayBadge').textContent = `Day ${d.day} · ${d.dayName}`;
  document.getElementById('mTitle').textContent = d.theme;
  document.getElementById('mTime').textContent = `Post at ${d.time}`;
  document.getElementById('mFormat').textContent = d.format;
  document.getElementById('mGoal').textContent = d.goal;

  // Slides
  const slidesEl = document.getElementById('mSlides');
  const slidesSection = document.getElementById('slidesSection');
  if (d.slides && d.slides.length > 1) {
    slidesSection.style.display = 'block';
    slidesEl.innerHTML = d.slides.map((s, i) => `
      <div class="slide-chip" style="background:${s.bg}">
        <span class="chip-num">${i + 1}</span>
        ${s.text.replace(/\n/g, '<br>')}
      </div>`).join('');
  } else {
    slidesSection.style.display = 'none';
  }

  document.getElementById('mCaption').textContent = d.caption;
  document.getElementById('mHashtags').textContent = d.hashtags;

  document.getElementById('navPrev').disabled = d.day === 1;
  document.getElementById('navNext').disabled = d.day === 30;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) closeOverlay();
}

function navigateDay(dir) {
  if (!currentDay) return;
  const newDay = currentDay.day + dir;
  if (newDay >= 1 && newDay <= 30) openDay(newDay);
}

// ─── COPY FUNCTIONS ───────────────────────────────────────────────────────────
function copyCaption() {
  const text = document.getElementById('mCaption').textContent;
  navigator.clipboard.writeText(text).then(() => {
    markCopied('caption');
    showToast('📋 Caption copied!');
  });
}

function copyHashtags() {
  const text = document.getElementById('mHashtags').textContent;
  navigator.clipboard.writeText(text).then(() => {
    markCopied('hashtags');
    showToast('# Hashtags copied!');
  });
}

function copyAll() {
  const caption = document.getElementById('mCaption').textContent;
  const hashtags = document.getElementById('mHashtags').textContent;
  const full = caption + '\n\n' + hashtags;
  navigator.clipboard.writeText(full).then(() => {
    markCopied('all');
    showToast('✨ Caption + Hashtags copied!');
    // Mark day as done
    if (currentDay) {
      copiedDays.add(currentDay.day);
      updateProgress();
      buildCalendar(activeFilter);
    }
  });
}

function markCopied(type) {
  const btns = document.querySelectorAll('.copy-btn');
  const idx = type === 'caption' ? 0 : type === 'hashtags' ? 1 : 2;
  btns[idx].classList.add('copied');
  btns[idx].textContent = '✅ Copied!';
  setTimeout(() => {
    btns[idx].classList.remove('copied');
    btns[idx].innerHTML = idx === 0 ? '<span>📋</span> Copy Caption' :
                           idx === 1 ? '<span>#</span> Copy Hashtags' :
                                       '<span>✨</span> Copy Both';
  }, 2000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updateProgress() {
  const pct = (copiedDays.size / 30) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${copiedDays.size} / 30 days copied`;
}

// ─── FILTER BAR ───────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    buildCalendar(activeFilter);
  });
});

// ─── KEYBOARD NAV ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!document.getElementById('overlay').classList.contains('open')) return;
  if (e.key === 'Escape') closeOverlay();
  if (e.key === 'ArrowLeft') navigateDay(-1);
  if (e.key === 'ArrowRight') navigateDay(1);
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildCalendar();

// ─── WATERMARK ────────────────────────────────────────────────────────────────
(function buildWatermark() {
  const container = document.getElementById('watermarkText');
  const text = 'The web visibility';
  const count = 12;
  let html = '';
  for (let i = 0; i < count; i++) {
    html += `<span class="watermark-item">${text}</span>`;
  }
  container.innerHTML = html;
})();
</script>
</body>
</html>
